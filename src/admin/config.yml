backend:
  name: github
  repo: "pablo7402/pablo7402.github.io"
  branch: main
  base_url: "https://pablo7402-github-io.vercel.app"
  auth_endpoint: "api/auth"

# Sécurité : la connexion se fait avec ton compte GitHub (bouton "Login with
# GitHub"). Seul un compte ayant les droits d'écriture sur ce dépôt peut
# réellement enregistrer des modifications — aucun mot de passe séparé n'est
# stocké dans le site. Vercel n'intervient que pour la connexion (2 petites
# fonctions dans /api) : le site lui-même est hébergé gratuitement sur GitHub
# Pages (voir GUIDE-GITHUB-PAGES.md).

# Mode local : quand le site tourne sur localhost, Decap utilise un petit
# serveur local (decap-server) au lieu de GitHub, pour éditer directement les
# fichiers sur ton disque. Voir GUIDE-TEST-LOCAL.md pour la marche à suivre.
local_backend: true

media_folder: "src/images/uploads"
public_folder: "/images/uploads"

publish_mode: simple

locale: "fr"

collections:
  - name: "categories"
    label: "Catégories (Wishlist)"
    label_singular: "Catégorie"
    folder: "src/categories"
    create: true
    delete: true
    slug: "{{slug}}"
    identifier_field: nom
    summary: "{{nom}}"
    fields:
      - { label: "Nom de la catégorie", name: "nom", widget: "string" }
      - { label: "Ordre d'affichage", name: "ordre", widget: "number", required: false, default: 10, hint: "Petit nombre = affichée en premier" }

  - name: "voyages"
    label: "Voyages"
    label_singular: "Voyage"
    folder: "src/voyages"
    create: true
    delete: true
    identifier_field: titre
    slug: "{{slug}}"
    summary: "{{titre}}"
    sortable_fields: ["date", "titre"]
    fields:
      - { label: "Titre", name: "titre", widget: "string", required: false }
      - { label: "Région / Zone", name: "region", widget: "string", required: false, hint: "Ex: Cévennes, Alpes, Pyrénées..." }
      - { label: "Date", name: "date", widget: "datetime", required: false, format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "Distance", name: "distance", widget: "string", required: false, hint: "Ex: 320 km" }
      - { label: "Durée", name: "duree", widget: "string", required: false, hint: "Ex: 3 jours" }
      - label: "Étiquettes"
        name: "tags"
        widget: "list"
        required: false
        hint: "Ex: Montagne, hors-piste, sinueux..."
        field: { label: "Étiquette", name: "label", widget: "string" }
      - { label: "Photo de couverture", name: "image", widget: "image", required: false }
      - { label: "Résumé court (affiché sur la page d'accueil)", name: "resume", widget: "text", required: false }
      - { label: "Récit / notes", name: "body", widget: "markdown", required: false, hint: "Raconte le trip : étapes, anecdotes, ressenti... aussi long ou court que tu veux." }
      - label: "Photos supplémentaires"
        name: "photos"
        widget: "list"
        required: false
        field: { label: "Photo", name: "src", widget: "image" }
      - label: "Vidéos YouTube"
        name: "videos"
        widget: "list"
        required: false
        field: { label: "Lien YouTube", name: "url", widget: "string", hint: "Colle l'URL de la vidéo (ex: https://youtu.be/...)" }
      - { label: "Lien album photos complet", name: "albumPhotos", widget: "string", required: false, hint: "Lien vers un album Google Photos (ou autre) en mode Restreint, à partager uniquement à tes amis. Un bouton apparaîtra sur la page du voyage." }

  - name: "garage"
    label: "Garage"
    label_singular: "Moto"
    folder: "src/garage"
    create: true
    delete: true
    identifier_field: titre
    slug: "{{slug}}"
    summary: "{{titre}}"
    sortable_fields: ["ordre", "titre"]
    fields:
      - { label: "Nom / titre", name: "titre", widget: "string", hint: "Ex: Ma Kove 800X Pro" }
      - { label: "Surnom (pilote/moto)", name: "surnom", widget: "string", required: false, hint: "Ex: Pablo & la Bête" }
      - { label: "Marque", name: "marque", widget: "string", required: false }
      - { label: "Modèle", name: "modele", widget: "string", required: false }
      - { label: "Année", name: "annee", widget: "number", required: false, value_type: "int" }
      - { label: "Ordre d'affichage", name: "ordre", widget: "number", required: false, default: 10, hint: "Petit nombre = affichée en premier" }
      - { label: "Photo de couverture", name: "image", widget: "image", required: false }
      - { label: "Cylindrée", name: "cylindree", widget: "string", required: false, hint: "Ex: 799 cm³" }
      - { label: "Puissance", name: "puissance", widget: "string", required: false, hint: "Ex: 94 ch" }
      - { label: "Poids", name: "poids", widget: "string", required: false, hint: "Ex: 199 kg (tous pleins faits)" }
      - { label: "Kilométrage", name: "kilometrage", widget: "string", required: false, hint: "Ex: 8 500 km" }
      - { label: "Description", name: "body", widget: "markdown", required: false, hint: "Présentation de la moto, ressenti, pourquoi ce choix..." }
      - label: "Modifications / accessoires"
        name: "modifications"
        widget: "list"
        required: false
        hint: "Ex: Pare-carter, valises, selle rehaussée..."
        field: { label: "Modification", name: "label", widget: "string" }
      - label: "Photos supplémentaires"
        name: "photos"
        widget: "list"
        required: false
        field: { label: "Photo", name: "src", widget: "image" }

  - name: "wishlist"
    label: "Liste de souhaits"
    label_singular: "Souhait"
    folder: "src/wishlist"
    create: true
    delete: true
    slug: "{{slug}}"
    identifier_field: titre
    summary: "{{titre}} — {{categorie}}"
    fields:
      - { label: "Titre", name: "titre", widget: "string" }
      - label: "Catégorie"
        name: "categorie"
        widget: "relation"
        collection: "categories"
        search_fields: ["nom"]
        value_field: "{{slug}}"
        display_fields: ["nom"]
        hint: "Choisis une catégorie existante, ou crée-en une nouvelle depuis la section Catégories."
      - { label: "Photo", name: "image", widget: "image", required: false }
      - { label: "Détail (sous-titre court)", name: "detail", widget: "string", required: false, hint: "Ex: référence, coloris, compatibilité..." }
      - { label: "Prix (€)", name: "prix", widget: "number", required: false, value_type: "float" }
      - { label: "Lien vers le site", name: "lien", widget: "string", required: false, hint: "URL de la page produit" }

  - name: "reglages"
    label: "Réglages du site"
    editor:
      preview: false
    files:
      - name: "accueil"
        label: "Page d'accueil"
        file: "src/_data/site.json"
        fields:
          - { label: "Titre du site (nav)", name: "titre", widget: "string" }
          - { label: "Phrase d'accroche (hero)", name: "sousTitre", widget: "string" }
          - { label: "Texte sous l'accroche", name: "heroTexte", widget: "text" }
          - { label: "Photo du hero (plein écran)", name: "heroImage", widget: "image" }
          - { label: "Texte du bouton du hero", name: "heroBouton", widget: "string" }
          - { label: "À propos (paragraphe de présentation)", name: "apropos", widget: "text", required: false }
          - { label: "Titre de la section Voyages", name: "sectionVoyagesTitre", widget: "string" }
          - { label: "Texte de la section Voyages", name: "sectionVoyagesTexte", widget: "string" }
          - { label: "Titre du bandeau Wishlist", name: "ctaTitre", widget: "string" }
          - { label: "Texte du bouton Wishlist", name: "ctaBouton", widget: "string" }
          - { label: "Nom (pied de page)", name: "auteur", widget: "string" }
          - { label: "Année (pied de page)", name: "annee", widget: "number" }
